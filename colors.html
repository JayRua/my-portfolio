<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; background: #05070D; color: white; }
    .palette { display: flex; flex-wrap: wrap; gap: 16px; }
    .card {
      width: 150px;
      height: 120px;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Colour Palette</h2>

<div class="palette">

  <div class="card" style="background:#05070D;">#05070D</div>
  <div class="card" style="background:#0A0F1C;">#0A0F1C</div>
  <div class="card" style="background:#0F1A2E;">#0F1A2E</div>
  <div class="card" style="background:#141C3A;">#141C3A</div>

  <div class="card" style="background:#2F6BFF;">#2F6BFF</div>
  <div class="card" style="background:#4A7DFF;">#4A7DFF</div>

  <div class="card" style="background:#6A5CFF;">#6A5CFF</div>
  <div class="card" style="background:#8B7BFF;">#8B7BFF</div>

  <div class="card" style="background:#FFFFFF; color:black;">#FFFFFF</div>
  <div class="card" style="background:#C7CEDB; color:black;">#C7CEDB</div>
  <div class="card" style="background:#8A93A6;">#8A93A6</div>

</div>

</body>
</html>
